<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TACO EMPIRE</title>
<style>
  /* fondo del letterbox: obsidiana E2 + patrón sutil de puntos naranja/oro
     + glow central cálido detrás del frame del juego */
  html,body{margin:0;padding:0;height:100%;overflow:hidden;
    display:flex;align-items:center;justify-content:center;background:#0d0d18}
  body{
    background-image:
      radial-gradient(rgba(255,107,53,0.055) 1.2px, transparent 1.4px),
      radial-gradient(rgba(255,215,0,0.04) 1.2px, transparent 1.4px),
      radial-gradient(1100px 780px at 50% 44%, #181828 0%, #0d0d18 70%);
    background-size:26px 26px, 26px 26px, 100% 100%;
    background-position:0 0, 13px 13px, 0 0}
  /* móvil: full-viewport 9:16 (como siempre). El backbuffer real lo fija
     el motor multiplicando por devicePixelRatio (nitidez retina). */
  canvas{background:#1a1a2e;max-height:100vh;max-width:100vw;aspect-ratio:9/16;
    touch-action:manipulation;display:block}
  #marca{display:none;position:fixed;top:20px;left:26px;
    font:900 17px/1 Arial,Helvetica,sans-serif;color:#ffd700;
    letter-spacing:2.5px;text-shadow:0 2px 10px rgba(0,0,0,0.85);
    user-select:none;pointer-events:none}
  #marca span{color:#ff6b35}
  /* desktop / ventana ancha: el juego centrado en un frame 9:16 de altura
     casi completa con letterbox elegante (borde cálido + glow + sombra).
     OJO cascada: este bloque va DESPUÉS de #marca{display:none} para ganarle
     (misma especificidad → gana el último). */
  @media (min-width:700px) and (min-aspect-ratio:5/7){
    canvas{max-height:96vh;border-radius:18px;
      box-shadow:0 0 0 1px rgba(255,107,53,0.30),
                 0 0 46px rgba(255,107,53,0.13),
                 0 26px 70px rgba(0,0,0,0.62)}
    #marca{display:block}
  }
  #err{position:fixed;top:8px;left:8px;right:8px;color:#ff6b6b;
    font:12px monospace;white-space:pre-wrap;z-index:9}
</style>
</head>
<body>
<div id="marca">&#127790; TACO <span>EMPIRE</span></div>
<canvas id="cv" width="540" height="960"></canvas>
<div id="err"></div>
<script type="module" src="src/main.js"></script>
</body>
</html>
